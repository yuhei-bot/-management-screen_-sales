<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>in'dex hair 管理システム</title>
    <style>
        :root {
            --primary-color: #333;
            --bg-color: #f8f9fa;
            --accent-color: #34495e;
            --danger-color: #e74c3c;
            --success-color: #2ecc71;
            --plus-color: #3498db;
            --card-bg: #fff;
            --shadow: 0 4px 12px rgba(0,0,0,0.08);
            --border-color: #ddd;
        }

        body {
            font-family: 'Helvetica Neue', Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            background: var(--bg-color);
            margin: 0;
            color: var(--primary-color);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            background: white;
            padding: 40px 0 30px 0;
            text-align: center;
            border-bottom: 1px solid #eee;
        }

        .header-main {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .logo { font-size: 2.2rem; font-weight: bold; color: #333; }

        .live-time-badge {
            background: #fff;
            border: 1px solid var(--border-color);
            padding: 8px 15px;
            border-radius: 25px;
            font-size: 1.1rem;
            font-weight: bold;
            color: #333;
        }

        nav { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }

        .nav-item {
            display: flex; align-items: center; gap: 8px; text-decoration: none;
            color: #444; font-size: 1.1rem; font-weight: bold; padding: 12px 25px;
            border-radius: 10px; border: 1px solid var(--border-color);
            background: white; transition: 0.2s;
        }

        .nav-item.active {
            background: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
        }

        main {
            padding: 50px 20px;
            width: 100%;
            max-width: 1200px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 40px;
        }
        
        @media (min-width: 900px) {
            main { grid-template-columns: 400px 1fr; align-items: start; }
        }

        .card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 24px;
            box-shadow: var(--shadow);
            text-align: center;
        }

        .card-title { font-weight: bold; color: #333; margin-bottom: 20px; display: block; font-size: 1.2rem;}

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 25px;
            background: #fafafa;
            border: 2px solid #eee;
            border-radius: 16px;
            padding: 0 20px;
        }

        .input-wrapper:focus-within {
            border-color: var(--accent-color);
            background: #fff;
        }

        .currency-unit {
            font-size: 2.2rem;
            color: #aaa;
            font-weight: bold;
            margin-right: 5px;
        }
        
        .cash-input {
            width: 100%;
            padding: 20px 0;
            font-size: 2.8rem;
            text-align: center;
            border: none;
            background: transparent;
            box-sizing: border-box;
            outline: none;
            font-weight: bold;
            color: var(--primary-color);
        }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

        .btn-main {
            width: 100%;
            padding: 18px;
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        #audit-result {
            margin-top: 30px;
            display: none;
            border-top: 2px solid #f0f0f0;
            padding-top: 30px;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .status-msg { font-size: 1.2rem; font-weight: bold; margin-bottom: 10px; }
        .diff-val { font-size: 1.6rem; font-weight: bold; margin-bottom: 20px; }
        .minus { color: var(--danger-color); }
        .plus { color: var(--plus-color); }
        .match { color: var(--success-color); }

        .report-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .report-box {
            background: #f1f3f5;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #e9ecef;
        }

        .r-label { font-size: 0.8rem; color: #777; margin-bottom: 3px; }
        .r-val { font-size: 1.1rem; font-weight: bold; }

        /* --- 履歴セクション --- */
        .history-card { text-align: left; display: flex; flex-direction: column; min-height: 600px; }
        
        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .month-select {
            padding: 8px 15px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            font-size: 1rem;
            background: #fff;
            cursor: pointer;
        }

        .history-scroll { 
            flex: 1;
            overflow-y: auto; 
            max-height: 400px; 
            border: 1px solid #f0f0f0;
            border-radius: 12px;
        }

        .history-table { width: 100%; border-collapse: collapse; }
        .history-table th { position: sticky; top: 0; background: #f8f9fa; text-align: left; color: #888; padding: 12px; border-bottom: 2px solid #eee; font-size: 0.85rem; z-index: 1; }
        .history-table td { padding: 12px; border-bottom: 1px solid #f0f0f0; font-size: 0.95rem; }

        .history-actions { display: flex; gap: 10px; justify-content: flex-end; }
        
        .icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            color: #aaa;
            transition: 0.2s;
            padding: 5px;
        }
        /* 鉛筆ボタン：ホバーで青 */
        .edit-btn:hover { color: var(--plus-color); transform: scale(1.2); }
        /* ゴミ箱ボタン：ホバーで赤 */
        .delete-btn:hover { color: var(--danger-color); transform: scale(1.2); }

        /* --- 合計表示 (フッター) --- */
        .total-summary {
            margin-top: 20px;
            padding: 20px;
            background: var(--accent-color);
            color: white;
            border-radius: 16px;
            display: flex;
            justify-content: space-around;
            text-align: center;
        }

        .total-item .t-label { font-size: 0.8rem; opacity: 0.8; margin-bottom: 5px; }
        .total-item .t-val { font-size: 1.3rem; font-weight: bold; }

        .empty-msg { color: #aaa; text-align: center; padding: 60px 0; font-style: italic; }
        
        .action-btns { display: flex; gap: 10px; margin-top: 10px; }
        .btn-flex { flex: 1; padding: 15px; border-radius: 12px; border: 1px solid var(--border-color); font-weight: bold; cursor: pointer; background: white; }
    </style>
</head>
<body>

<header>
    <div class="header-main">
        <div class="logo">in'dex hair 管理システム</div>
        <div id="live-time" class="live-time-badge">00:00:00</div>
    </div>
    <nav>
        <a href="#" class="nav-item"><span>📅 カレンダー</span></a>
        <a href="#" class="nav-item"><span>⏳ タイムライン</span></a>
        <a href="#" class="nav-item"><span>🖼️ ギャラリー編集</span></a>
        <a href="#" class="nav-item active"><span>💰 売上管理</span></a>
    </nav>
</header>

<main>
    <section class="card">
        <span class="card-title" id="today-title">レジ金入力</span>
        
        <div class="input-wrapper">
            <span class="currency-unit">¥</span>
            <input type="number" id="cash-input" class="cash-input" placeholder="0" autofocus>
        </div>

        <button class="btn-main" id="check-btn" onclick="runAudit()">照合する</button>

        <div id="audit-result">
            <div id="status-text" class="status-msg"></div>
            <div id="diff-text" class="diff-val"></div>

            <div class="report-grid">
                <div class="report-box"><div class="r-label">確定売上</div><div id="res-sales" class="r-val"></div></div>
                <div class="report-box"><div class="r-label">本日利益</div><div id="res-profit" class="r-val"></div></div>
                <div class="report-box"><div class="r-label">来店件数</div><div id="res-count" class="r-val">8件</div></div>
                <div class="report-box"><div class="r-label">利益率</div><div id="res-rate" class="r-val"></div></div>
            </div>

            <div id="final-action" style="display:none;">
                <button class="btn-main" id="save-btn" onclick="saveData()">この内容で保存して終了</button>
            </div>

            <div class="action-btns" id="error-actions" style="display:none;">
                <button class="btn-flex btn-main" onclick="alert('詳細を確認します')">確認</button>
                <button class="btn-flex" onclick="reInput()">再入力</button>
            </div>
        </div>
    </section>

    <section class="card history-card">
        <div class="history-header">
            <span class="card-title" style="margin-bottom:0;">売上履歴</span>
            <select id="month-filter" class="month-select" onchange="loadHistory()">
            </select>
        </div>

        <div class="history-scroll">
            <table class="history-table">
                <thead>
                    <tr>
                        <th>日付</th>
                        <th>売上</th>
                        <th>利益</th>
                        <th>率</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="history-body"></tbody>
            </table>
            <div id="empty-msg" class="empty-msg" style="display:none;">データがありません</div>
        </div>

        <div class="total-summary" id="total-summary" style="display:none;">
            <div class="total-item"><div class="t-label">月間合計売上</div><div id="total-sales" class="t-val">¥0</div></div>
            <div class="total-item"><div class="t-label">月間合計利益</div><div id="total-profit" class="t-val">¥0</div></div>
            <div class="total-item"><div class="t-label">平均利益率</div><div id="total-rate" class="t-val">0%</div></div>
        </div>
    </section>
</main>

<script>
    const sysData = { sales: 125000, cost: 62500 };
    let tempRecord = null;

    function updateLiveTime() {
        const now = new Date();
        document.getElementById('live-time').textContent = now.toLocaleTimeString('ja-JP', { hour12: false });
        const days = ['日', '月', '火', '水', '木', '金', '土'];
        const dateStr = `${now.getMonth() + 1}/${now.getDate()} (${days[now.getDay()]})`;
        document.getElementById('today-title').textContent = `本日 ${dateStr} のレジ金入力`;
    }
    setInterval(updateLiveTime, 1000);
    updateLiveTime();

    window.onload = () => {
        initMonthFilter();
        loadHistory();
    };

    function initMonthFilter() {
        const select = document.getElementById('month-filter');
        const now = new Date();
        for (let i = 0; i < 6; i++) {
            const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
            const val = `${d.getFullYear()}-${(d.getMonth() + 1).toString().padStart(2, '0')}`;
            const label = `${d.getFullYear()}年 ${d.getMonth() + 1}月`;
            select.innerHTML += `<option value="${val}">${label}</option>`;
        }
    }

    function runAudit() {
        const inputVal = parseInt(document.getElementById('cash-input').value) || 0;
        if(inputVal === 0) return;

        // 本日の重複チェック
        const now = new Date();
        const days = ['日', '月', '火', '水', '木', '金', '土'];
        const todayStr = `${now.getMonth() + 1}/${now.getDate()} (${days[now.getDay()]})`;
        const history = JSON.parse(localStorage.getItem('index_hair_sales') || '[]');
        
        if(history.some(item => item.date === todayStr)) {
            alert("本日の売上は既に保存されています。修正が必要な場合は履歴の「✎」ボタンから編集してください。");
            reInput();
            return;
        }

        const diff = inputVal - sysData.sales;
        const profit = inputVal - sysData.cost;
        const rate = ((profit / inputVal) * 100).toFixed(1);

        tempRecord = {
            id: Date.now(),
            monthKey: `${now.getFullYear()}-${(now.getMonth() + 1).toString().padStart(2, '0')}`,
            date: todayStr,
            sales: inputVal,
            profit: profit,
            rate: parseFloat(rate)
        };

        document.getElementById('res-sales').innerText = `¥${inputVal.toLocaleString()}`;
        document.getElementById('res-profit').innerText = `¥${profit.toLocaleString()}`;
        document.getElementById('res-rate').innerText = `${rate}%`;

        const st = document.getElementById('status-text');
        const dt = document.getElementById('diff-text');

        if(diff === 0) {
            st.innerText = "✓ 金額一致"; st.className = "status-msg match";
            dt.innerText = "";
            document.getElementById('final-action').style.display = "block";
            document.getElementById('error-actions').style.display = "none";
        } else {
            st.innerText = "⚠ 不一致"; st.className = "status-msg minus";
            dt.innerText = `差分：${diff > 0 ? '+' : ''}${diff.toLocaleString()}円`;
            dt.className = `diff-val ${diff > 0 ? 'plus' : 'minus'}`;
            document.getElementById('final-action').style.display = "none";
            document.getElementById('error-actions').style.display = "flex";
        }

        document.getElementById('audit-result').style.display = 'block';
        document.getElementById('check-btn').style.display = 'none';
        document.getElementById('cash-input').disabled = true;
    }

    function reInput() {
        document.getElementById('audit-result').style.display = 'none';
        document.getElementById('check-btn').style.display = 'block';
        const input = document.getElementById('cash-input');
        input.disabled = false; input.value = ""; input.focus();
    }

    function saveData() {
        let history = JSON.parse(localStorage.getItem('index_hair_sales') || '[]');
        history.unshift(tempRecord);
        localStorage.setItem('index_hair_sales', JSON.stringify(history));
        alert("保存しました");
        location.reload();
    }

    // --- 【新機能】ポップアップ編集 ---
    function editRecord(id) {
        let history = JSON.parse(localStorage.getItem('index_hair_sales') || '[]');
        const targetIndex = history.findIndex(item => item.id === id);
        if(targetIndex === -1) return;

        const oldSales = history[targetIndex].sales;
        const newSalesStr = prompt(`${history[targetIndex].date} の売上金額を編集しますか？`, oldSales);
        
        if (newSalesStr !== null) {
            const newSales = parseInt(newSalesStr);
            if (isNaN(newSales) || newSales < 0) {
                alert("有効な数字を入力してください");
                return;
            }

            // 再計算（コストはsysData.costを使用する簡易ロジック）
            const newProfit = newSales - sysData.cost;
            const newRate = ((newProfit / newSales) * 100).toFixed(1);

            history[targetIndex].sales = newSales;
            history[targetIndex].profit = newProfit;
            history[targetIndex].rate = parseFloat(newRate);

            localStorage.setItem('index_hair_sales', JSON.stringify(history));
            loadHistory(); // 履歴と合計を再描画
        }
    }

    // --- 【新機能】削除機能 ---
    function deleteRecord(id) {
        if (!confirm("この日のデータを削除しますか？\n削除すると月間合計も再計算されます。")) return;

        let history = JSON.parse(localStorage.getItem('index_hair_sales') || '[]');
        history = history.filter(item => item.id !== id);
        
        localStorage.setItem('index_hair_sales', JSON.stringify(history));
        loadHistory(); // 履歴と合計を再描画
    }

    function loadHistory() {
        const selectedMonth = document.getElementById('month-filter').value;
        const history = JSON.parse(localStorage.getItem('index_hair_sales') || '[]');
        const filtered = history.filter(item => item.monthKey === selectedMonth);
        const tbody = document.getElementById('history-body');
        const emptyMsg = document.getElementById('empty-msg');
        const totalSummary = document.getElementById('total-summary');

        if(filtered.length > 0) {
            emptyMsg.style.display = 'none';
            totalSummary.style.display = 'flex';
            tbody.innerHTML = filtered.map(item => `
                <tr>
                    <td>${item.date}</td>
                    <td>¥${item.sales.toLocaleString()}</td>
                    <td>¥${item.profit.toLocaleString()}</td>
                    <td>${item.rate}%</td>
                    <td class="history-actions">
                        <button class="icon-btn edit-btn" onclick="editRecord(${item.id})" title="編集">✎</button>
                        <button class="icon-btn delete-btn" onclick="deleteRecord(${item.id})" title="削除">🗑</button>
                    </td>
                </tr>
            `).join('');

            const sumSales = filtered.reduce((a, b) => a + b.sales, 0);
            const sumProfit = filtered.reduce((a, b) => a + b.profit, 0);
            const avgRate = sumSales > 0 ? (sumProfit / sumSales * 100).toFixed(1) : 0;

            document.getElementById('total-sales').innerText = `¥${sumSales.toLocaleString()}`;
            document.getElementById('total-profit').innerText = `¥${sumProfit.toLocaleString()}`;
            document.getElementById('total-rate').innerText = `${avgRate}%`;
        } else {
            tbody.innerHTML = "";
            emptyMsg.style.display = 'block';
            totalSummary.style.display = 'none';
        }
    }
</script>

</body>
</html>
